name: terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      # allowed_origins has no default (required). Supplied from a repo Actions
      # variable so CI apply/plan don't prompt. Set ALLOWED_ORIGINS to a JSON
      # list, e.g. ["https://your-app.vercel.app"]. TF_VAR_ feeds Terraform directly.
      TF_VAR_allowed_origins: ${{ vars.ALLOWED_ORIGINS }}
    defaults:
      run:
        working-directory: terraform/environments/mirra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_INFRA_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Init
        run: terraform init -backend-config=backend.hcl

      - name: Validate
        run: terraform validate

      - name: Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false

      - name: Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false -auto-approve
